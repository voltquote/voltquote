<html lang="en">

  <title>VoltQuote — App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --yellow: #F5C500;
      --ydim: rgba(245,197,0,0.1);
      --yellow-glow: rgba(245,197,0,0.15);
      --black: #060809;
      --dark: #0C0F13;
      --card: #111418;
      --card2: #161a20;
      --border: rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.1);
      --text: #E8E8E8;
      --muted: #4a4a4a;
      --green: #22c55e;
    }
    body { 
      font-family: 'DM Sans', sans-serif; 
      background: var(--black); 
      color: var(--text); 
      min-height: 100vh;
      background-image: radial-gradient(ellipse 800px 600px at 100% 0%, rgba(245,197,0,0.03) 0%, transparent 60%);
    }

    /* ── LAYOUT ── */
    .shell { display: flex; min-height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 230px; flex-shrink: 0;
      background: var(--dark);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 0;
      position: fixed; top: 0; left: 0; bottom: 0;
      z-index: 50;
      box-shadow: 4px 0 30px rgba(0,0,0,0.4);
    }

    .sidebar-logo {
      display: flex; align-items: center; gap: 10px;
      padding: 22px 20px;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
    }

    .sidebar-logo-icon {
      width: 30px; height: 30px; background: var(--yellow);
      border-radius: 6px; display: flex; align-items: center;
      justify-content: center; font-size: 16px; color: #000; flex-shrink: 0;
    }

    .sidebar-logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; letter-spacing: 2px; color: #fff;
    }

    .sidebar-nav { flex: 1; padding: 16px 10px; display: flex; flex-direction: column; gap: 4px; }

    .nav-item {
      display: flex; align-items: center; gap: 11px;
      padding: 11px 14px; border-radius: 10px;
      font-size: 14px; font-weight: 500; color: #666;
      cursor: pointer; transition: all 0.2s; text-decoration: none;
      border: none; background: none; width: 100%; text-align: left;
      letter-spacing: 0.2px;
    }

    .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); transform: translateX(2px); }
    .nav-item.active { background: var(--ydim); color: var(--yellow); border: 1px solid rgba(245,197,0,0.15); }
    .nav-item-icon { font-size: 16px; width: 20px; text-align: center; }

    .sidebar-user {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      font-size: 13px;
    }

    .user-name { font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .user-plan { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

    /* ── MAIN ── */
    .main { margin-left: 220px; flex: 1; padding: 36px 40px; min-height: 100vh; }

    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px;
    }

    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 40px; letter-spacing: 3px; color: #fff;
      line-height: 1;
    }

    .page-sub { font-size: 13px; color: #3a3d44; margin-top: 6px; letter-spacing: 0.5px; }

    /* ── AUTH SCREEN ── */
    .auth-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px;
      background: var(--black);
      background-image: radial-gradient(ellipse 600px 400px at 50% 40%, rgba(245,197,0,0.05) 0%, transparent 70%);
    }

    .auth-card {
      background: var(--dark);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%; max-width: 420px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(245,197,0,0.04);
    }

    .auth-logo {
      display: flex; align-items: center; gap: 10px; margin-bottom: 32px;
    }

    .auth-logo-icon {
      width: 36px; height: 36px; background: var(--yellow);
      border-radius: 8px; display: flex; align-items: center;
      justify-content: center; font-size: 18px; color: #000;
    }

    .auth-logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px; letter-spacing: 2px;
    }

    .auth-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 40px; letter-spacing: 1.5px; margin-bottom: 6px; line-height: 1;
    }

    .auth-sub { font-size: 14px; color: var(--muted); margin-bottom: 32px; }

    .auth-tabs {
      display: flex; gap: 0;
      background: var(--card);
      border-radius: 8px; padding: 4px; margin-bottom: 28px;
    }

    .auth-tab {
      flex: 1; padding: 9px; border-radius: 6px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; border: none; background: none;
      color: var(--muted); transition: all 0.2s;
    }

    .auth-tab.active { background: var(--yellow); color: #000; }

    .form-group { margin-bottom: 16px; }

    label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

    input[type=text], input[type=email], input[type=password], input[type=number], select, textarea {
      width: 100%; background: #0d1014; border: 1px solid #1e2228;
      border-radius: 10px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 15px;
      padding: 13px 16px; outline: none; transition: all 0.2s;
    }

    input:focus, select:focus, textarea:focus { border-color: rgba(245,197,0,0.4); background: #0f1318; box-shadow: 0 0 0 3px rgba(245,197,0,0.06); }
    input::placeholder, textarea::placeholder { color: #444; }
    textarea { resize: vertical; min-height: 110px; line-height: 1.7; }
    select option { background: #0d1014; }

    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; padding: 13px 24px; letter-spacing: 0.3px; }
    .btn-yellow { background: var(--yellow); color: #000; }
    .btn-yellow:hover:not(:disabled) { background: #ffd700; transform: translateY(-2px); box-shadow: 0 12px 40px rgba(245,197,0,0.35); }
    .btn-yellow:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-outline { background: rgba(255,255,255,0.03); color: #777; border: 1px solid var(--border); }
    .btn-outline:hover { border-color: rgba(255,255,255,0.15); color: var(--text); background: rgba(255,255,255,0.06); }
    .btn-full { width: 100%; }
    .btn-sm { padding: 9px 18px; font-size: 13px; border-radius: 8px; }

    /* ── QUOTE FORM ── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .full { grid-column: 1 / -1; }

    .section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 4px;
      text-transform: uppercase; color: var(--yellow);
      margin-bottom: 16px; margin-top: 32px;
      display: flex; align-items: center; gap: 12px;
      opacity: 0.8;
    }

    .section-label::after { content: ''; flex: 1; height: 1px; background: rgba(245,197,0,0.1); }

    .section-label:first-child { margin-top: 0; }

    .section-label::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(245,197,0,0.15);
    }

    /* ── QUOTE OUTPUT ── */
    .quote-card {
      background: var(--dark);
      border: 1px solid var(--border2);
      border-top: 3px solid var(--yellow);
      border-radius: 16px;
      overflow: hidden;
      margin-top: 32px;
      animation: fadeUp 0.4s ease;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(245,197,0,0.05);
    }

    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

    .quote-head {
      padding: 28px 32px;
      background: linear-gradient(135deg, #13161b 0%, #0f1218 100%);
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: flex-start;
      position: relative;
      overflow: hidden;
    }

    .quote-head::before {
      content: "⚡";
      position: absolute;
      right: 28px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 80px;
      opacity: 0.04;
      pointer-events: none;
    }

    .quote-company-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px; letter-spacing: 2px;
    }

    .quote-num { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: var(--yellow); }
    .quote-date { font-size: 12px; color: var(--muted); margin-top: 4px; }

    .quote-body { padding: 28px; }

    .scope-box {
      background: var(--card); border-radius: 8px;
      padding: 14px 18px; font-size: 14px;
      line-height: 1.7; color: #aaa; margin-bottom: 4px;
    }

    table { width: 100%; border-collapse: collapse; border-radius: 10px; overflow: hidden; }
    th { text-align: left; font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #333; padding: 12px 16px; background: #0a0c10; border-bottom: 1px solid #1a1e24; }
    th:last-child { text-align: right; }
    td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid #13161b; vertical-align: top; }
    td:last-child { text-align: right; font-weight: 600; color: #ccc; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.01); }

    .item-name { font-weight: 500; color: #e0e0e0; }
    .item-desc { font-size: 12px; color: #444; margin-top: 3px; }

    .totals {
      background: var(--card); border-radius: 8px;
      padding: 16px 20px; display: flex;
      flex-direction: column; gap: 10px;
    }

    .total-row { display: flex; justify-content: space-between; font-size: 14px; color: #666; }
    .total-grand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px; color: var(--yellow);
      padding-top: 14px; border-top: 1px solid rgba(245,197,0,0.2); letter-spacing: 2px;
      text-shadow: 0 0 30px rgba(245,197,0,0.3);
    }

    .notes-box {
      background: var(--card);
      border-left: 3px solid rgba(245,197,0,0.3);
      padding: 14px 18px; font-size: 14px;
      line-height: 1.7; color: #666; border-radius: 0 8px 8px 0;
    }

    .detail-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;
    }

    .detail-box {
      background: var(--card); padding: 14px 18px; border-radius: 8px;
    }

    .detail-box-label { font-size: 11px; color: #444; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
    .detail-box-val { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; }

    /* ── ACTIONS ROW ── */
    .actions-row { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }

    /* ── EMAIL MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 20px; backdrop-filter: blur(4px);
    }

    .modal {
      background: var(--dark); border: 1px solid var(--border);
      border-radius: 16px; padding: 36px; width: 100%; max-width: 460px;
    }

    .modal h3 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; margin-bottom: 8px; }
    .modal p { font-size: 14px; color: var(--muted); margin-bottom: 24px; }

    /* ── HISTORY ── */
    .history-list { display: flex; flex-direction: column; gap: 12px; }

    .history-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 18px 20px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; transition: all 0.15s;
    }

    .history-item:hover { border-color: rgba(245,197,0,0.2); background: #15181f; }

    .history-job { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .history-meta { font-size: 12px; color: var(--muted); }
    .history-amount { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 1px; color: var(--yellow); }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center; padding: 80px 20px;
      border: 1px dashed #222; border-radius: 12px;
    }

    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; margin-bottom: 8px; }
    .empty-sub { font-size: 14px; color: var(--muted); }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--card); border: 1px solid var(--border);
      border-left: 3px solid var(--yellow);
      border-radius: 10px; padding: 14px 20px;
      font-size: 14px; z-index: 300;
      animation: slideIn 0.3s ease;
      max-width: 320px;
    }

    @keyframes slideIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }

    /* ── SPINNER ── */
    .spinner { width: 20px; height: 20px; border: 2px solid rgba(0,0,0,0.2); border-top-color: #000; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── LOADING OVERLAY ── */
    .loading-overlay {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 70px;
      display: flex; flex-direction: column; align-items: center;
      gap: 20px; margin-top: 32px;
      box-shadow: inset 0 0 60px rgba(245,197,0,0.02);
    }

    .loading-spinner { width: 36px; height: 36px; border: 3px solid rgba(245,197,0,0.2); border-top-color: var(--yellow); border-radius: 50%; animation: spin 0.8s linear infinite; }
    .loading-text { font-size: 14px; color: var(--muted); letter-spacing: 1px; }

    /* ── MOBILE NAV ── */
    .mobile-nav {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--dark);
      border-top: 1px solid var(--border);
      padding: 10px 0 20px;
      z-index: 100;
      justify-content: space-around;
    }
    .mobile-nav-btn {
      display: flex; flex-direction: column; align-items: center;
      gap: 4px; background: none; border: none;
      color: #555; font-size: 11px; font-family: "DM Sans", sans-serif;
      cursor: pointer; padding: 6px 16px; border-radius: 8px;
      transition: color 0.2s;
    }
    .mobile-nav-btn.active { color: var(--yellow); }
    .mobile-nav-btn-icon { font-size: 20px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .mobile-nav { display: flex; }
      .main { margin-left: 0; padding: 20px 16px 100px; }
      .form-grid { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
      .page-title { font-size: 28px; }
      .actions-row { flex-direction: column; }
      .actions-row .btn { width: 100%; justify-content: center; }
      .quote-head { flex-direction: column; gap: 12px; padding: 20px; }
      .quote-body { padding: 16px; }
      table { font-size: 12px; }
      td, th { padding: 10px 8px; }
      .loading-overlay { padding: 40px 20px; }
      .auth-screen { padding: 20px 16px; }
      .auth-card { padding: 32px 24px; }
    }
  </style>

</head>

<script>

const SUPABASE_URL = 'https://gtyhbxkabxzolzohkbnn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0eWhieGthYnh6b2x6b2hrYm5uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MjgyNjQsImV4cCI6MjA4OTEwNDI2NH0.6PULPUcDwjZRHOJQ2pNpptcsua-Yif83ivZyWVZmOuU';

// ─────────────────────────────────────────────

let state = {
  page: 'auth',       // auth | quote | history | settings
  authMode: 'login',  // login | signup
  user: null,

function render() {
  const root = document.getElementById('root');
  if (state.page === 'auth') {
    root.innerHTML = renderAuth();

    root.innerHTML = renderApp();

  }

// ─────────────────────────────────────────────
// AUTH
// ─────────────────────────────────────────────
function renderAuth() {
  return `

      </button>
      <div style="text-align:center; margin-top:20px; font-size:13px; color:var(--muted)">
        ${state.authMode==='login'?'No account? <a href="#" data-auth="signup" style="color:var(--yellow);text-decoration:none;">Sign up free</a>':'Already have an account? <a href="#" data-auth="login" style="color:var(--yellow);text-decoration:none;">Log in</a>'}
      </div>
      <div style="margin-top:24px; padding-top:20px; border-top:1px solid var(--border); text-align:center;">

// ─────────────────────────────────────────────
// EVENTS
// ─────────────────────────────────────────────
function attachEvents() {
  // Auth tabs
  document.querySelectorAll('[data-auth]').forEach(el => {
    el.addEventListener('click', () => { state.authMode = el.dataset.auth; render(); });
  });

  // Demo login
  const demo = document.getElementById('demo-login');
  if (demo) demo.addEventListener('click', () => login(true));

  // Auth submit
  const authBtn = document.getElementById('auth-submit');
  if (authBtn) authBtn.addEventListener('click', () => login(false));

  // Sidebar nav
  document.querySelectorAll('[data-page]').forEach(el => {
    el.addEventListener('click', () => { state.page = el.dataset.page; state.quote = null; render(); });
  });

  // Form fields
  document.querySelectorAll('[data-field]').forEach(el => {
    el.addEventListener('input', () => { state.form[el.dataset.field] = el.value; });
  });

  // Generate button
  const genBtn = document.getElementById('gen-btn');
  if (genBtn) genBtn.addEventListener('click', generateQuote);

  // Save
  const saveBtn = document.getElementById('save-btn');
  if (saveBtn) saveBtn.addEventListener('click', saveQuote);

  // Email modal open
  const emailBtn = document.getElementById('email-btn');
  if (emailBtn) emailBtn.addEventListener('click', () => { state.showEmailModal = true; render(); });

  // Close modal
  const closeModal = document.getElementById('close-modal');
  if (closeModal) closeModal.addEventListener('click', () => { state.showEmailModal = false; render(); });

  const modalOverlay = document.getElementById('modal-overlay');
  if (modalOverlay) modalOverlay.addEventListener('click', (e) => { if(e.target===modalOverlay){ state.showEmailModal=false; render(); }});

  // Send email
  const sendBtn = document.getElementById('send-email-btn');
  if (sendBtn) sendBtn.addEventListener('click', sendEmail);

  // Regen
  const regenBtn = document.getElementById('regen-btn');
  if (regenBtn) regenBtn.addEventListener('click', generateQuote);

  // New
  const newBtn = document.getElementById('new-btn');
  if (newBtn) newBtn.addEventListener('click', () => { state.quote=null; state.form={company:'',client:'',jobType:'',location:'',sqft:'',amps:'',description:''}; render(); });

  // Delete saved
  document.querySelectorAll('[data-delete]').forEach(el => {
    el.addEventListener('click', (e) => { e.stopPropagation(); const idx=parseInt(el.dataset.delete); state.savedQuotes.splice(idx,1); localStorage.setItem('vq_quotes',JSON.stringify(state.savedQuotes)); showToast('Quote deleted'); render(); });
  });

  // Logout
  const logout = document.getElementById('logout-btn');
  if (logout) logout.addEventListener('click', () => { state.user=null; state.page='auth'; state.quote=null; render(); });

  // Save settings
  const saveSettings = document.getElementById('save-settings');
  if (saveSettings) saveSettings.addEventListener('click', () => {
    state.user.company = document.getElementById('set-company').value;
    state.user.name = document.getElementById('set-name').value;
    state.user.email = document.getElementById('set-email').value;
    state.user.phone = document.getElementById('set-phone').value;
    state.user.license = document.getElementById('set-license').value;
    state.user.taxRate = document.getElementById('set-tax').value;
    state.user.markup = document.getElementById('set-markup').value;
    // Handle logo upload
    const logoFile = document.getElementById('set-logo')?.files[0];
    if (logoFile) {
      const reader = new FileReader();
      reader.onload = (e) => {
        state.user.logoUrl = e.target.result;
        localStorage.setItem('vq_user', JSON.stringify(state.user));
        showToast('✓ Settings saved');
        render();
      };
      reader.readAsDataURL(logoFile);
      return;
    }
    localStorage.setItem('vq_user', JSON.stringify(state.user));
    if (state.user?.id) {
      sb.from('users').update({ company: state.user.company, name: state.user.name, phone: state.user.phone, license: state.user.license, tax_rate: state.user.taxRate }).eq('id', state.user.id);
    }
    showToast('✓ Settings saved');
    render();
  });
}

// ACTIONS
// ─────────────────────────────────────────────
function login(demo) {
  if (demo) {
    const saved = localStorage.getItem('vq_user');
    state.user = saved ? JSON.parse(saved) : { ...DEMO_USER };
    state.form.company = state.user.company || 'My Electric LLC';
    state.page = 'quote';
    render();
    return;
  }
  // Real Supabase auth
  const email = document.getElementById('auth-email')?.value?.trim();
  const password = document.getElementById('auth-pass')?.value;
  const company = document.getElementById('auth-company')?.value?.trim();
  if (!email || !password) { showToast('⚠ Enter email and password'); return; }
  if (state.authMode === 'signup') {
    signUp(email, password, company);
  } else {
    signIn(email, password);
  }
}

async function signUp(email, password, company) {
  showToast('Creating account...');
  const { data, error } = await sb.auth.signUp({ email, password });
  if (error) { showToast('⚠ ' + error.message); return; }
  // Save user profile to DB
  await sb.from('users').insert({ 
    id: data.user.id, email, company: company||'My Electric LLC',
    name: '', phone: '', license: '', tax_rate: '6', plan: 'free', quote_count: 0
  });
  state.user = { id: data.user.id, email, company: company||'My Electric LLC', name: '', phone: '', license: '', taxRate: '6', plan: 'FREE', quote_count: 0 };
  state.form.company = state.user.company;
  localStorage.setItem('vq_user', JSON.stringify(state.user));
  state.page = 'quote';
  showToast('✅ Account created! Welcome to VoltQuote');
  render();
}

async function signIn(email, password) {
  showToast('Logging in...');
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { showToast('⚠ ' + error.message); return; }
  // Load user profile from DB
  const { data: profile } = await sb.from('users').select('*').eq('id', data.user.id).single();
  if (profile) {
    state.user = { id: profile.id, email: profile.email, company: profile.company, name: profile.name, phone: profile.phone, license: profile.license, taxRate: profile.tax_rate, plan: profile.plan.toUpperCase(), quote_count: profile.quote_count };
    state.quoteCount = profile.quote_count || 0;
  } else {
    state.user = { id: data.user.id, email, company: 'My Electric LLC', name: '', phone: '', license: '', taxRate: '6', plan: 'FREE' };
  }
  state.form.company = state.user.company;
  localStorage.setItem('vq_user', JSON.stringify(state.user));
  state.page = 'quote';
  showToast('✅ Welcome back!');
  render();
}

async function generateQuote() {
  const f = state.form;
  if (!f.jobType || !f.description) {
    showToast('⚠ Please fill in Job Type and Description');
    return;
  }
  // Quote limit for free plan
  const isPro = state.user?.plan === 'PRO' || state.user?.plan === 'PRO TRIAL';
  if (!isPro && state.quoteCount >= 5) {
    state.showUpgradeModal = true;
    render();
    return;
  }
  state.loading = true;
  state.quote = null;
  render();

  const markup = parseFloat(state.user?.markup || 20);
  const taxRate = parseFloat(state.user?.taxRate || 6);
  const prompt = `You are a licensed master electrician and expert estimator with 25+ years of field experience. Before generating this estimate, use web search to look up CURRENT 2025-2026 prices for the specific materials needed for this job. Search for prices on Home Depot, Platt Electric, or Graybar for the most common items. Generate the most accurate, detailed electrical estimate possible using real current market prices.

CRITICAL ACCURACY RULES:
- Use REAL 2025-2026 market prices from electrical supply houses (Platt, Graybar, Home Depot Pro)
- Account for the specific LOCATION when pricing labor: ${f.location || 'US average'}
  * Michigan/Midwest labor: $75-95/hr journeyman
  * Northeast (NY/NJ/MA): $110-140/hr
  * Southeast: $65-85/hr
  * West Coast (CA/WA/OR): $95-125/hr
  * Use regional permit costs — Michigan permits typically $150-400
- Break down EVERY material individually — wire by the foot, each breaker, every connector
- Include ALL hidden costs: wire nuts, tape, staples, connectors, boxes, screws, permit fees
- Apply a ${markup}% contractor markup on materials (standard industry practice)
- Labor rate should match the location above

Job Type: ${f.jobType}
Location: ${f.location || 'Not specified'}
${f.sqft ? `Square Footage: ${f.sqft} sq ft` : ''}
${f.amps ? `Existing Panel: ${f.amps}` : ''}
Job Description: ${f.description.replace(/^(description:|100a|200a)/gi,'').trim()}

REQUIRED line item examples for accuracy:
- "12/2 Romex NM-B wire" — price per foot x actual footage needed
- "20A Square D QO120 breaker" — exact model, real price
- "200A Square D QO140L200PG main panel" — exact model if panel upgrade
- "4/0 aluminum SEU service entrance cable" — per foot
- "Lapeer County electrical permit" — real local permit cost
- "Wire nuts, tape, staples (misc)" — realistic hardware total
- Separate line for EACH circuit or major component

Return ONLY valid JSON — no markdown, no backticks, no explanation:
{
  "scopeOfWork": "3-4 sentence professional summary of exactly what work will be performed and why",
  "lineItems": [
    { "name": "200A Square D QO140L200PG Main Panel", "description": "40-space 200A load center with main breaker", "qty": 1, "unit": "ea", "unitPrice": 285, "total": 285 }
  ],
  "laborHours": 8,
  "laborRate": 85,
  "laborTotal": 680,
  "materialTotal": 850,
  "subtotal": 1530,
  "tax": 91.80,
  "grandTotal": 1621.80,
  "validDays": 30,
  "estimatedDuration": "1-2 days",
  "notes": "Include: permit requirements, utility coordination needed, access requirements, warranty info, and any conditions that could affect price",
  "warrantyCoverage": "1 year parts and labor on all installed components"
}

Minimum 10 line items. Use exact SKU-level product names. Be conservative on labor hours — underestimating loses money.`;

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 45000);
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: controller.signal,
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    clearTimeout(timeout);
    if (!res.ok) {
      showToast('⚠ Server error: ' + res.status + '. Try again.');
      state.loading = false;
      render();
      return;
    }
    const data = await res.json();
    if (data.error) {
      showToast('⚠ API Error: ' + (data.error.message || 'Unknown error'));
      state.loading = false;
      render();
      return;
    }
    const text = data.content?.map(b => b.text||'').join('') || '';
    const clean = text.replace(/```json|```/g,'').trim();
    try {
      state.quote = JSON.parse(clean);
      state.quoteCount++;
      localStorage.setItem('vq_quote_count', state.quoteCount);
      // Sync to Supabase if logged in
      if (state.user?.supabaseId) {
        supabase.from('users').update({ quote_count: state.quoteCount }).eq('id', state.user.supabaseId).then(() => {});
      }
      if (state.user?.id) { sb.from('users').update({ quote_count: state.quoteCount }).eq('id', state.user.id); }
    } catch(parseErr) {
      showToast('⚠ Could not parse quote. Please try again.');
    }
  } catch(e) {
    if (e.name === 'AbortError') {
      showToast('⚠ Request timed out. Check your connection and try again.');
    } else {
      showToast('⚠ Connection error. Make sure you have internet and try again.');
    }
  }
  state.loading = false;
  render();
}

function saveQuote() {
  if (!state.quote) return;
  const entry = {
    ...state.quote,
    jobType: state.form.jobType,
    client: state.form.client,
    location: state.form.location,
    date: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
  };
  state.savedQuotes.push(entry);
  localStorage.setItem('vq_quotes', JSON.stringify(state.savedQuotes));
  showToast('✓ Quote saved!');
  render();
}

  if (!to) { showToast('⚠ Enter a customer email'); return; }
  if (!state.quote) return;

  state.emailSending = true;
  render();

  const q = state.quote;
  const f = state.form;
  const body = `Hi ${f.client || 'there'},

Thank you for the opportunity. Here is your quote:

JOB: ${f.jobType}
${f.location ? 'LOCATION: '+f.location : ''}

SCOPE: ${q.scopeOfWork}

LINE ITEMS:
${q.lineItems.map(i => `  ${i.name}: $${i.total.toFixed(2)}`).join('\n')}
  Labor (${q.laborHours} hrs): $${q.laborTotal.toFixed(2)}

Materials: $${q.materialTotal.toFixed(2)}

${fromName || f.company || 'Your Electrician'}`;

  try {
    // EmailJS — add your keys at the top of this file
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE, {
      to_email: to,
      to_name: f.client || 'Customer',
      from_name: fromName || f.company || 'Electrician',
      subject: `Electrical Quote — ${f.jobType} — $${q.grandTotal.toFixed(0)}`,
      message: body
    }, EMAILJS_PUBLIC_KEY);
    state.emailSending = false;
    state.showEmailModal = false;
    showToast('✅ Quote emailed successfully!');
  } catch(e) {
    state.emailSending = false;
    showToast('⚠ Email failed. Check your EmailJS setup.');
  }
  render();

function showToast(msg) {
  state.toast = msg;
  render();
}

// ── START ──
render();

function updateLineItem(index, field, value) {
  if (!state.quote || !state.quote.lineItems[index]) return;
  state.quote.lineItems[index][field] = parseFloat(value) || 0;
  state.quote.lineItems[index].total = state.quote.lineItems[index].qty * state.quote.lineItems[index].unitPrice;
  // Recalculate totals
  const matTotal = state.quote.lineItems.reduce((s,i) => s + i.total, 0);
  state.quote.materialTotal = matTotal;
  state.quote.subtotal = matTotal + state.quote.laborTotal;
  state.quote.tax = state.quote.subtotal * (parseFloat(state.user?.taxRate || 6) / 100);
  state.quote.grandTotal = state.quote.subtotal + state.quote.tax;
  render();
}

function updateLabor(field, value) {
  if (!state.quote) return;
  if (field === 'hours') state.quote.laborHours = parseFloat(value) || 0;
  if (field === 'rate') state.quote.laborRate = parseFloat(value) || 0;
  state.quote.laborTotal = state.quote.laborHours * state.quote.laborRate;
  state.quote.subtotal = state.quote.materialTotal + state.quote.laborTotal;
  state.quote.tax = state.quote.subtotal * (parseFloat(state.user?.taxRate || 6) / 100);
  state.quote.grandTotal = state.quote.subtotal + state.quote.tax;
  render();
}

function exportToExcel() {
  if (!state.quote) return;
  const q = state.quote;
  const rows = [
    ['VoltQuote — Professional Electrical Estimate'],
    [],
    ['Company', state.form.company || 'My Electric LLC'],
    ['Client', state.form.client || ''],
    ['Location', state.form.location || ''],
    ['Date', new Date().toLocaleDateString()],
    ['Quote #', 'VQ-' + Math.random().toString(36).substr(2,6).toUpperCase()],
    [],
    ['SCOPE OF WORK'],
    [q.scope || ''],
    [],
    ['LINE ITEMS'],
    ['Item', 'Description', 'Qty', 'Unit', 'Unit Price', 'Total'],
  ];
  (q.lineItems || []).forEach(item => {
    rows.push([item.name, item.description || '', item.qty, item.unit || 'ea', item.unitPrice, item.total]);
  });
  rows.push([]);
  const materialTotal = (q.lineItems||[]).reduce((s,i)=>s+(parseFloat(i.total)||0),0);
  rows.push(['', '', '', '', 'Materials', '$'+materialTotal.toFixed(2)]);
  rows.push(['', '', '', '', 'Labor ('+q.laborHours+' hrs)', '$'+(q.laborTotal||0).toFixed(2)]);
  rows.push(['', '', '', '', 'Subtotal', '$'+(q.subtotal||0).toFixed(2)]);
  rows.push(['', '', '', '', 'Tax', '$'+((q.grandTotal||0)-(q.subtotal||0)).toFixed(2)]);
  rows.push(['', '', '', '', 'TOTAL', '$'+(q.grandTotal||0).toFixed(2)]);
  rows.push([]);
  rows.push(['Est. Duration', q.estimatedDuration || '']);
  rows.push(['Warranty', q.warrantyCoverage || '']);
  rows.push(['Notes', q.notes || '']);

  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:28},{wch:36},{wch:8},{wch:8},{wch:14},{wch:14}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Quote');
  XLSX.writeFile(wb, 'VoltQuote-' + (state.form.client || 'Estimate').replace(/\s+/g,'-') + '.xlsx');
  showToast('✅ Excel file downloaded!');
}
